<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker | Login</title>
    <!-- daisyUI and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
</head>
<body class="font-geist">

    <!-- main -->
    <section class="bg-[#F8FAFC] min-h-svh flex justify-center items-center">
        <div class="bg-base-100 w-full max-w-sm shadow-2xl">
            <div class="card-body">
                <div class="flex flex-col justify-center items-center space-y-1">
                    <div class="w-20">
                        <img src="./assets/github-logo.png" alt="">
                    </div>
                    <h2 class="text-[#1F2937] font-semibold text-2xl">GitHub Issues Tracker</h2>
                    <p class="text-sm md:text-base text-[#64748B]">Sign in to manage your issues</p>
                </div>
                <!-- input fields -->
                <fieldset class="fieldset">

                <label class="text-[#1F2937] font-medium label">Username</label>
                <input id="userInput" type="text" class="input w-full text-[#64748B]" placeholder="Enter Username" />
                <span class="text-[#4A00FF] font-normal">Default: admin</span>

                <label class="text-[#1F2937] font-medium label">Password</label>
                <input id="passInput" type="password" class="input w-full text-[#64748B]" placeholder="Password" />
                <span class="text-[#4A00FF] font-normal">Default: admin123</span>

                <button onclick="signIn()" class="btn btn-primary w-full mt-4">Login</button>

                </fieldset>

                <!-- divider -->
                <div class="divider">OR</div>

                <div>
                    <p class="text-[#64748B] text-center mb-2">Demo Credentials:</p>
                    <div class="bg-[#F8FAFC] rounded-lg p-5">
                        <p class="text-[#64748B] text-center"><span class="text-[#1F2937] font-medium">Username:</span> admin</p>
                        <p class="text-[#64748B] text-center"><span class="text-[#1F2937] font-medium">Password:</span> admin123</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- js file -->
    <script src="login.js"></script>
</body>
</html>
