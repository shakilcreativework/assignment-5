<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker</title>
    <!-- daisyUI and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
</head>
<body class="font-geist">
    <!-- header -->
    <header class="shadow-md">
        <div class="max-w-[1440px] flex flex-col sm:flex-row justify-between items-center py-5 mx-auto gap-5 px-4 lg:px-0">
            <div class="flex gap-2 items-center">
                <img class="w-9" src="./assets/github-logo.png" alt="">
                <h2 class="font-semibold text-2xl text-[#1F2937]">GitHub Issues Tracker</h2>
            </div>
            <div>
            <div class="join">
                <div>
                    <label class="input validator join-item">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search issues..." required />
                    </label>
                    <div class="validator-hint hidden">Enter valid email address</div>
                </div>
                <button class="btn btn-primary join-item">Search</button>
                </div>
            </div>
        </div>
    </header>

    <!-- main -->
    <section class="bg-[#F8FAFC] min-h-[calc(100svh-80px)]">
        <div class="max-w-[1110px] mx-auto py-10">
            <!-- btn groups -->
            <div class="flex gap-3 bg-white rounded-lg p-5 justify-center md:justify-start">
                <button class="tab-btn px-10 font-medium py-2 rounded bg-blue-600 text-white" data-tab="all">All</button>
                <button class="tab-btn px-10 font-medium py-2 rounded bg-gray-200" data-tab="open">Open</button>
                <button class="tab-btn px-10 font-medium py-2 rounded bg-gray-200" data-tab="closed">Closed</button>
            </div>
        </div>
    </section>
</body>
</html>
